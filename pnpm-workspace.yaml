# pnpm Workspace Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Declares which directories are workspace packages.
# pnpm links these together locally so cross-package imports work without
# publishing to a registry.
#
# Docs: https://pnpm.io/workspaces

packages:
  - 'apps/*' # Next.js frontend, docs site, etc.
  - 'services/*' # NestJS API, FastAPI wrapper
  - 'packages/*' # Shared TypeScript libraries and configs
  - 'contracts' # Main Hardhat / Solidity project
  - 'contracts/*' # Future additional contract packages (if needed)
